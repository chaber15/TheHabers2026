[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Guest list is read at runtime by Netlify Functions (not shipped in dist/)
[functions]
  included_files = ["data/guests.json"]

[dev]
  command = "astro dev"
  targetPort = 4321
  port = 8888
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
